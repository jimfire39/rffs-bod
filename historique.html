<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique formations — RFFS BOD</title>
<style>
:root{--navy:#1F3864;--orange:#C55A11;--green:#375623;--red:#C00000;--gray:#595959;--border:#e0e0e0;--bg:#f0f4f8;--card:#fff;--text:#1a1a1a;--muted:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;padding:1.5rem;}
.screen.active{display:block;}
/* LOGIN */
.login-wrap{max-width:380px;margin:4rem auto;}
.login-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.login-icon{text-align:center;font-size:36px;margin-bottom:1rem;}
.login-title{text-align:center;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:1.5rem;}
/* MAIN */
.main-wrap{max-width:860px;margin:0 auto;}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;}
.page-hdr h1{font-size:18px;font-weight:700;color:var(--navy);}
.hdr-actions{display:flex;gap:8px;flex-wrap:wrap;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;}
.stat-n{font-size:26px;font-weight:700;color:var(--navy);}
.stat-n.ok{color:var(--green);}
.stat-n.ko{color:var(--red);}
.stat-n.wip{color:var(--orange);}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
/* TABS MOIS */
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.m-tab{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s;}
.m-tab:hover{border-color:var(--navy);color:var(--navy);}
.m-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
/* TABLE FICHES */
.fiches-hdr{display:grid;grid-template-columns:100px 1fr 70px 130px 90px;gap:8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:4px;}
.fiche-row{display:grid;grid-template-columns:100px 1fr 70px 130px 90px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px;}
.fiche-row:last-child{border-bottom:none;}
.col-date{color:var(--muted);}
.col-theme{font-size:11px;color:var(--muted);}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;}
.badge-ok{background:#e8f5e9;color:var(--green);}
.badge-ko{background:#fce4e4;color:var(--red);}
.badge-wip{background:#fff3e0;color:var(--orange);}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:13px;}
/* Modale lecture fiche */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal-hdr{background:var(--navy);color:#fff;padding:14px 18px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.modal-hdr h3{font-size:14px;font-weight:500;}
.modal-body{padding:16px;}
.modal-field{margin-bottom:12px;}
.modal-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.modal-value{font-size:13px;color:var(--text);}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
@media print{.modal-overlay{display:block!important;position:static;background:none;padding:0;}
.modal{box-shadow:none;max-height:none;border-radius:0;}
.modal-footer,.modal-hdr button,.app-bar,.hdr-actions{display:none!important;}
body>*:not(.modal-overlay){display:none!important;}}
/* FORMS */
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:10px;}
label:first-child{margin-top:0;}
input[type=password],input[type=text]{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
input:focus{border-color:var(--navy);}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-family:inherit;}
.btn-navy{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-navy:hover{background:#162d52;}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-green:hover{background:#2a4f1b;}
.btn-red{background:#fff;color:var(--red);border-color:var(--red);}
.btn-red:hover{background:#fce4e4;}
.btn-ghost{background:#fff;color:var(--gray);border-color:var(--border);}
.btn-ghost:hover{background:var(--bg);}
.btn-full{width:100%;justify-content:center;margin-top:8px;}
.err{font-size:12px;color:var(--red);min-height:18px;margin-top:4px;}
.suc{font-size:12px;color:var(--green);min-height:18px;margin-top:4px;}
.dv{height:1px;background:var(--border);margin:1.2rem 0;}
/* ADMIN */
.admin-wrap{max-width:440px;margin:0 auto;}
.admin-section-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;}
/* APP HEADER */
.app-bar{background:var(--navy);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.app-bar-title{font-size:13px;font-weight:700;color:#fff;}
.app-bar-sub{font-size:10px;color:rgba(255,255,255,.5);}
.back-link{font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;text-decoration:underline;}
/* ANNÉE TITRE */
.year-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px;}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .fiches-hdr,.fiche-row{grid-template-columns:80px 1fr 60px 80px;}
  .fiche-row>:nth-child(4){display:none;}
  .fiches-hdr>:nth-child(4){display:none;}
}
</style>
</head>
<body>

<!-- Login supprimé — accès direct -->

<!-- ── MAIN ──────────────────────────────────────────────────────────────── -->
<div id="screen-main" class="screen active">
  <div class="app-bar">
    <div>
      <div class="app-bar-title">Historique formations — RFFS BOD</div>
      <div class="app-bar-sub">Suivi réglementaire annuel</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="index.html" style="font-size:11px;color:rgba(255,255,255,.7);text-decoration:none;margin-right:8px;">← Accueil</a><span class="back-link" onclick="syncFromSupabase()" style="margin-right:10px;">🔄 Sync</span><span class="back-link" onclick="showAdmin()">⚙ Admin</span>
    </div>
  </div>
  <div style="padding:1.5rem;">
    <div class="main-wrap">
      <div class="page-hdr">
        <h1 id="year-counter">2026 — 0 fiche</h1>
        <div class="hdr-actions">
          <button class="btn btn-green" onclick="exportCSVProtected()">⬇ Exporter CSV</button>
          <button class="btn btn-navy" onclick="showChef()" style="background:var(--navy);">👨‍✈️ Chef de service</button>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats" id="stats-block"></div>

      <!-- FICHES PAR MOIS -->
      <div class="card">
        <div class="month-tabs" id="month-tabs"></div>
        <div id="fiches-content"><div class="empty">Aucune fiche enregistrée.</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── CHEF DE SERVICE ───────────────────────────────────────────────────── -->
<div id="screen-chef" class="screen">
  <div class="app-bar">
    <div>
      <div class="app-bar-title">Chef de service — Gestion des fiches</div>
    </div>
    <span class="back-link" onclick="showMain()">← Retour</span>
  </div>
  <div style="padding:1.5rem;">
    <div class="main-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;">
            <input type="checkbox" id="chk-chef-all" onchange="document.querySelectorAll('.chk-chef').forEach(c=>c.checked=this.checked)">
            Tout sélectionner
          </label>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-green" onclick="exportCSV()">⬇ Exporter CSV</button>
          <button class="btn btn-red" onclick="deleteChefSelected()">🗑 Supprimer la sélection</button>
        </div>
      </div>
      <div class="card" id="chef-content"></div>
    </div>
  </div>
</div>

<!-- ── ADMIN ─────────────────────────────────────────────────────────────── -->
<div id="screen-admin" class="screen">
  <div class="app-bar">
    <div>
      <div class="app-bar-title">Administration</div>
    </div>
    <span class="back-link" onclick="showMain()">← Retour</span>
  </div>
  <div style="padding:1.5rem;">
    <div class="admin-wrap">

      <div class="card">
        <div class="admin-section-title">Mot de passe historique</div>
        <label>Mot de passe actuel</label>
        <input type="password" id="pw-current" placeholder="Mot de passe actuel">
        <label>Nouveau mot de passe</label>
        <input type="password" id="pw-new" placeholder="Nouveau mot de passe">
        <label>Confirmer</label>
        <input type="password" id="pw-confirm" placeholder="Confirmer">
        <div class="err" id="pw-msg"></div>
        <button class="btn btn-navy btn-full" onclick="changePw()">Enregistrer</button>
      </div>

      <div class="card">
        <div class="admin-section-title">Mot de passe Chef de service</div>
        <label>Mot de passe actuel</label>
        <input type="password" id="chef-current" placeholder="Mot de passe actuel">
        <label>Nouveau mot de passe</label>
        <input type="password" id="chef-new" placeholder="Nouveau mot de passe">
        <label>Confirmer</label>
        <input type="password" id="chef-confirm" placeholder="Confirmer">
        <div class="err" id="chef-msg"></div>
        <button class="btn btn-navy btn-full" onclick="changeChefPw()">Enregistrer</button>
      </div>

      <div class="card">
        <div class="admin-section-title">Mot de passe administrateur</div>
        <label>Mot de passe admin actuel</label>
        <input type="password" id="adm-current" placeholder="Mot de passe admin actuel">
        <label>Nouveau mot de passe admin</label>
        <input type="password" id="adm-new" placeholder="Nouveau mot de passe admin">
        <label>Confirmer</label>
        <input type="password" id="adm-confirm" placeholder="Confirmer">
        <div class="err" id="adm-msg"></div>
        <button class="btn btn-navy btn-full" onclick="changeAdmPw()">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<script>

// ── SUPABASE SYNC ─────────────────────────────────────────────────────────────
const SUPA_URL = 'https://swrjwiujatbbpmznaffc.supabase.co';
const SUPA_KEY = 'sb_publishable_NT3U2klv36FaOY2H-dujyw_3AO49Q0E';

async function supabaseInsert(fiche) {
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/fiches', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        date:         fiche.date        || '',
        heure:        fiche.heure       || '',
        aeronef:      fiche.aeronef     || '',
        theme:        fiche.theme       || '',
        niveau:       fiche.niveau      || 0,
        conditions:   fiche.conditions  || '',
        agents:       fiche.agents      || '',
        resultat:     fiche.resultat    || '',
        observations: fiche.observations|| '',
        source:       fiche.source      || 'Web'
      })
    });
    if(res.ok) console.log('Supabase: fiche enregistrée');
    else console.warn('Supabase erreur:', res.status, await res.text());
  } catch(e) {
    console.warn('Supabase offline:', e.message);
  }
}

async function supabaseGetAll() {
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/fiches?order=created_at.desc', {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY
      }
    });
    if(res.ok) return await res.json();
    return [];
  } catch(e) {
    console.warn('Supabase lecture échouée:', e.message);
    return [];
  }
}

const KEY_DATA = 'rffs_formatives';
const KEY_CHEF = 'rffs_chef_pw';
const KEY_PW   = 'rffs_hist_pw';
const KEY_ADM  = 'rffs_admin_pw';
const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let activeMonth = null;

function getPw()  { return localStorage.getItem(KEY_PW)  || 'RFFSBOD96'; }
function getAdm() { return localStorage.getItem(KEY_ADM) || 'RFFSBOD96'; }
function getData(){ return JSON.parse(localStorage.getItem(KEY_DATA) || '[]'); }

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function exportCSVProtected(){
  const pw = prompt('Mot de passe Chef de service :');
  if(pw === null) return;
  if(pw !== getChefPw()){ alert('Mot de passe incorrect.'); return; }
  exportCSV();
}

function showAdmin(){
  const adm = prompt('Mot de passe administrateur :');
  if(adm === getAdm()) show('screen-admin');
  else if(adm !== null) alert('Mot de passe admin incorrect.');
}

function showMain(){ show('screen-main'); renderAll(); }

function msg(id, txt, ok){
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = ok ? 'suc' : 'err';
  if(ok) setTimeout(()=>el.textContent='', 3000);
}

function changePw(){
  const cur = document.getElementById('pw-current').value;
  const nw  = document.getElementById('pw-new').value;
  const cf  = document.getElementById('pw-confirm').value;
  if(cur !== getPw()){ msg('pw-msg','Mot de passe actuel incorrect.',false); return; }
  if(!nw){ msg('pw-msg','Nouveau mot de passe vide.',false); return; }
  if(nw !== cf){ msg('pw-msg','Les mots de passe ne correspondent pas.',false); return; }
  localStorage.setItem(KEY_PW, nw);
  msg('pw-msg','Mot de passe mis à jour.',true);
  ['pw-current','pw-new','pw-confirm'].forEach(i=>document.getElementById(i).value='');
}

function changeChefPw(){
  const cur=document.getElementById('chef-current').value;
  const nw =document.getElementById('chef-new').value;
  const cf =document.getElementById('chef-confirm').value;
  if(cur!==getChefPw()){msg('chef-msg','Mot de passe actuel incorrect.',false);return;}
  if(!nw){msg('chef-msg','Nouveau mot de passe vide.',false);return;}
  if(nw!==cf){msg('chef-msg','Les mots de passe ne correspondent pas.',false);return;}
  localStorage.setItem(KEY_CHEF,nw);
  msg('chef-msg','Mot de passe Chef mis à jour.',true);
  ['chef-current','chef-new','chef-confirm'].forEach(i=>document.getElementById(i).value='');
}

function changeAdmPw(){
  const cur = document.getElementById('adm-current').value;
  const nw  = document.getElementById('adm-new').value;
  const cf  = document.getElementById('adm-confirm').value;
  if(cur !== getAdm()){ msg('adm-msg','Mot de passe admin incorrect.',false); return; }
  if(!nw){ msg('adm-msg','Nouveau mot de passe vide.',false); return; }
  if(nw !== cf){ msg('adm-msg','Les mots de passe ne correspondent pas.',false); return; }
  localStorage.setItem(KEY_ADM, nw);
  msg('adm-msg','Mot de passe admin mis à jour.',true);
  ['adm-current','adm-new','adm-confirm'].forEach(i=>document.getElementById(i).value='');
}

function renderAll(){
  const data = getData();
  const total = data.length;
  const val   = data.filter(f=>f.resultat==='validé').length;
  const nval  = data.filter(f=>f.resultat==='non_validé').length;

  // Compteur année
  document.getElementById('year-counter').textContent = `2026 — ${total} fiche${total>1?'s':''}`;

  // Stats
  document.getElementById('stats-block').innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total fiches</div></div>
    <div class="stat"><div class="stat-n ok">${val}</div><div class="stat-l">Validées</div></div>
    <div class="stat"><div class="stat-n ko">${nval}</div><div class="stat-l">Non validées</div></div>
`;

  // Grouper par mois
  const byMonth = {};
  data.forEach(f=>{
    const parts = (f.date||'').split('/');
    const m = parts.length===3 ? parseInt(parts[1])-1 : new Date().getMonth();
    if(!byMonth[m]) byMonth[m]=[];
    byMonth[m].push(f);
  });

  const months = Object.keys(byMonth).map(Number).sort((a,b)=>a-b);
  if(!months.length){
    document.getElementById('month-tabs').innerHTML='';
    document.getElementById('fiches-content').innerHTML='<div class="empty">Aucune fiche enregistrée pour le moment.</div>';
    return;
  }

  if(activeMonth===null || !byMonth[activeMonth]) activeMonth = months[months.length-1];

  document.getElementById('month-tabs').innerHTML = months.map(m=>
    `<div class="m-tab ${m===activeMonth?'active':''}" onclick="setMonth(${m})">${MOIS[m]} (${byMonth[m].length})</div>`
  ).join('');

  renderMonth(byMonth[activeMonth]||[]);
}

function setMonth(m){ activeMonth=m; renderAll(); }

function exportPDFMois(){
  const data = getData();
  const byMonth = {};
  data.forEach(f=>{
    const parts=(f.date||'').split('/');
    const m=parts.length===3?parseInt(parts[1])-1:new Date().getMonth();
    if(!byMonth[m]) byMonth[m]=[];
    byMonth[m].push(f);
  });
  const fiches = byMonth[activeMonth]||[];
  if(!fiches.length){ alert('Aucune fiche ce mois.'); return; }
  const w = window.open('','_blank');
  const MOIS_NOMS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fiches ${MOIS_NOMS[activeMonth]} 2026</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:20px;}
  h1{font-size:14px;color:#1F3864;border-bottom:2px solid #1F3864;padding-bottom:6px;margin-bottom:14px;}
  .fiche{border:1px solid #ddd;border-radius:6px;padding:10px 12px;margin-bottom:10px;page-break-inside:avoid;}
  .fiche-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .fiche-title{font-weight:700;font-size:12px;color:#1F3864;}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;}
  .ok{background:#e8f5e9;color:#375623;}.ko{background:#fce4e4;color:#C00000;}.wip{background:#fff3e0;color:#C55A11;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}
  .lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px;}
  .val{font-size:11px;color:#222;}
  .obs{background:#f8f8f8;border-radius:4px;padding:6px;font-style:italic;color:#555;margin-top:6px;font-size:10px;}
  @media print{body{margin:10px;}}</style></head><body>
  <h1>RFFS BOD — Fiches ${MOIS_NOMS[activeMonth]} 2026 (${fiches.length} fiche${fiches.length>1?'s':''})</h1>
  ${fiches.map(f=>{
    const badge = f.resultat==='validé'?'ok':f.resultat==='non_validé'?'ko':'wip';
    const label = f.resultat==='validé'?'VALIDÉ':f.resultat==='non_validé'?'NON VALIDÉ':'EN COURS';
    const agents = (f.agents||'—').split('|').filter(Boolean).join(', ');
    return `<div class="fiche">
      <div class="fiche-hdr"><span class="fiche-title">${f.aeronef||'—'} — ${f.theme||'—'}</span><span class="badge ${badge}">${label}</span></div>
      <div class="grid">
        <div><div class="lbl">Date</div><div class="val">${f.date||'—'} ${f.heure||''}</div></div>
        <div><div class="lbl">Niveau</div><div class="val">Niv. ${f.niveau||'—'}</div></div>
        <div><div class="lbl">Conditions</div><div class="val">${f.conditions||'—'}</div></div>
        <div><div class="lbl">Source</div><div class="val">${f.source||'Web'}</div></div>
        <div style="grid-column:span 2"><div class="lbl">Agents</div><div class="val">${agents}</div></div>
      </div>
      ${f.observations?`<div class="obs">${f.observations}</div>`:''}
    </div>`;
  }).join('')}
  </body></html>`);
  w.document.close();
  setTimeout(()=>w.print(), 500);
}

function renderMonth(fiches){
  if(!fiches.length){
    document.getElementById('fiches-content').innerHTML='<div class="empty">Aucune fiche ce mois.</div>';
    return;
  }
  document.getElementById('fiches-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
      <label style="font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;">
        <input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"> Tout sélectionner
      </label>

function toggleAll(checked){

async function deleteSelected(){
  const checked = [...document.querySelectorAll('.chk-fiche:checked')];
  if(!checked.length){ alert('Aucune fiche sélectionnée.'); return; }
  if(!confirm(`Supprimer ${checked.length} fiche(s) ? Cette action est irréversible.`)) return;

  const ids = checked.map(c=>c.dataset.id);

  // Supprimer du localStorage
  let data = getData().filter(f=>!ids.includes(String(f.id)));
  localStorage.setItem(KEY_DATA, JSON.stringify(data));

  // Supprimer de Supabase (si ID numérique = Supabase)
  for(const id of ids){
    if(!isNaN(id) && String(id).length < 15){ // ID Supabase = petit entier
      try{
        await fetch(SUPA_URL + '/rest/v1/fiches?id=eq.' + id, {
          method: 'DELETE',
          headers: {
            'apikey': SUPA_KEY,
            'Authorization': 'Bearer ' + SUPA_KEY
          }
        });
      } catch(e){ console.warn('Supabase delete error:', e); }
    }
  }

  activeMonth = null;
  renderAll();
}

function exportCSV(){
  const data = getData();
  if(!data.length){ alert('Aucune fiche à exporter.'); return; }
  const cols = ['Date','Heure','Aéronef','Thème','Niveau','Conditions','Agents','Résultat','Observations'];
  const rows = data.map(f=>[
    f.date||'', f.heure||'', f.aeronef||'', f.theme||'',
    f.niveau||'', f.conditions||'', (f.agents||'').replace(/\|/g,','),
    f.resultat||'', (f.observations||'').replace(/\n/g,' ')
  ]);
  const csv = [cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'RFFS_BOD_Formations_2026.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function syncFromSupabase(){
  const btn = document.querySelector('[onclick="syncFromSupabase()"]');
  if(btn) btn.textContent = '⏳ Sync...';
  const fiches = await supabaseGetAll();
  if(!fiches.length){ 
    alert('Aucune fiche trouvée sur Supabase.');
    if(btn) btn.textContent = '🔄 Sync';
    return;
  }
  // Convertir le format Supabase → format local
  const remote = fiches.map(f=>({
    id:           f.id,
    date:         f.date,
    heure:        f.heure,
    aeronef:      f.aeronef,
    theme:        f.theme,
    niveau:       f.niveau,
    conditions:   f.conditions,
    agents:       f.agents,
    resultat:     f.resultat,
    observations: f.observations,
    source:       f.source||'Web'
  }));
  // Fusionner avec les fiches locales — éviter les doublons par ID
  const local = getData();
  const remoteIds = new Set(remote.map(f=>String(f.id)));
  const localOnly = local.filter(f=>!remoteIds.has(String(f.id)));
  const merged = [...remote, ...localOnly];
  // Trier par date décroissante
  merged.sort((a,b)=>{
    const da = (a.date||'').split('/').reverse().join('-');
    const db = (b.date||'').split('/').reverse().join('-');
    return db.localeCompare(da);
  });
  localStorage.setItem(KEY_DATA, JSON.stringify(merged));
  activeMonth = null;
  renderAll();
  if(btn) btn.textContent = '🔄 Sync';
  alert(`✓ ${merged.length} fiche(s) au total — ${remote.length} cloud + ${localOnly.length} locales fusionnées.`);
}
