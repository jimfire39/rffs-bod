<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Fiches d'Exercice RFFS BOD</title>
<style>
:root{--navy:#1F3864;--navy-l:#2a4a80;--orange:#C55A11;--orange-l:#e06820;--red:#C00000;--green:#375623;--amber:#E36C09;--gray:#595959;--lgray:#f5f5f5;--lblue:#D6E4F7;--border:#ddd;--text:#1a1a1a;--text-m:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:var(--text);min-height:100vh;}
.app-header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;align-items:stretch;}
.hdr-brand{padding:14px 24px;display:flex;flex-direction:column;justify-content:center;}
.hdr-brand h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px;}
.hdr-brand span{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.hdr-badge{background:var(--orange);padding:14px 20px;margin-left:auto;display:flex;align-items:center;}
.hdr-badge span{font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;}
.app-body{max-width:1200px;margin:0 auto;padding:20px 14px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;position:sticky;top:68px;}
.panel-title{background:var(--navy);padding:12px 18px;font-size:12px;font-weight:700;color:#fff;letter-spacing:.8px;text-transform:uppercase;}
.panel-body{padding:18px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fg select,.fg input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:#fff;transition:border-color .2s;appearance:none;}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--navy);}
.sw{position:relative;}
.sw::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none;font-size:11px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tg{display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.tg input{display:none;}
.tg label{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;transition:all .2s;margin:0;text-transform:none;letter-spacing:0;border:none;}
.tg input:checked+label{background:var(--navy);color:#fff;}
.div{height:1px;background:var(--border);margin:14px 0;}
.btn-gen{width:100%;padding:12px;background:var(--orange);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;}
.btn-gen:hover{background:var(--orange-l);}
.btn-gen:active{transform:scale(.98);}
.btn-prt{width:100%;padding:9px;background:#fff;color:var(--navy);border:1.5px solid var(--navy);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn-prt:hover{background:var(--navy);color:#fff;}
.fiche-wrap{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;}
.placeholder{padding:70px 30px;text-align:center;color:var(--text-m);}
.placeholder .ico{font-size:40px;margin-bottom:14px;opacity:.25;}
.placeholder h3{font-size:17px;font-weight:500;margin-bottom:6px;color:var(--gray);}
.placeholder p{font-size:13px;}
/* FICHE */
.fiche-hdr{display:grid;grid-template-columns:1fr auto;}
.fhdr-l{background:var(--navy);padding:13px 18px;}
.fhdr-l h2{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px;}
.fhdr-l span{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px;display:block;}
.fhdr-r{background:var(--orange);padding:13px 18px;display:flex;align-items:center;}
.fhdr-r span{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;}
.fiche-body{padding:16px;}
.id-t{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px;}
.id-t td{padding:6px 9px;border:1px solid #ccc;}
.lbl{background:#f0f0f0;font-weight:600;color:var(--gray);font-size:10px;text-transform:uppercase;white-space:nowrap;}
.vm{font-weight:700;color:var(--navy);font-size:14px;}
.vniv{font-weight:800;font-size:18px;text-align:center;}
.vr{color:var(--red)}.va{color:var(--amber)}.vg{color:var(--green)}.vo{color:var(--orange)}
.vav{color:var(--red);font-weight:700}.vpob{color:var(--red);font-weight:700;font-size:15px;}
.bg-b{background:var(--lblue);}
.shdr{padding:7px 12px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.8px;text-transform:uppercase;margin:12px 0 8px;border-radius:4px;}
.shdr.nv{background:var(--navy)}.shdr.gy{background:var(--gray)}.shdr.or{background:var(--orange);}
.abox{border:2px solid var(--amber);background:#fffbe6;border-radius:7px;padding:12px 14px;margin-bottom:8px;}
.abox p{font-size:12px;line-height:1.6;margin-bottom:3px;}
.abox .bd{font-weight:700}.abox .it{font-style:italic;}
.qbox{font-size:11px;color:var(--gray);margin-bottom:14px;font-style:italic;padding:7px 11px;background:var(--lgray);border-radius:5px;border-left:3px solid var(--navy);}
.qbox strong{color:var(--navy);font-style:normal;}
.st{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px;}
.st td{border:1px solid #ccc;vertical-align:top;}
.sl{width:32px;text-align:center;font-size:20px;font-weight:800;color:#fff;padding:10px 4px;}
.slb{width:80px;font-size:10px;font-weight:700;padding:8px 7px;background:var(--lgray);text-transform:uppercase;letter-spacing:.5px;}
.sc{padding:9px 11px;line-height:1.6;}
.ss{background:var(--navy)}.si{background:var(--orange)}.sm{background:var(--red)}.ssec{background:var(--green);}
.ssl{color:var(--navy)}.sil{color:var(--orange)}.sml{color:var(--red)}.ssecl{color:var(--green);}
.dt{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px;}
.dt th{background:var(--navy);color:#fff;padding:7px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--navy);text-align:left;}
.dt td{padding:7px 9px;border:1px solid #ccc;vertical-align:top;}
.dt tr:nth-child(even) td{background:var(--lgray);}
.vn{font-weight:700;color:var(--navy)}.sn{font-weight:700;color:var(--orange);}
.tg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.tc{border:1px solid #ddd;border-radius:7px;padding:10px;background:var(--lgray);font-size:11px;}
.tc h4{font-size:11px;font-weight:700;margin-bottom:5px;}
.tc ul{list-style:none;padding:0;}
.tc ul li{padding:2px 0;color:var(--text-m);line-height:1.5;}
.tc ul li::before{content:'› ';color:var(--navy);}

.fiche-footer{border-top:1px solid var(--border);padding:8px 18px;font-size:10px;color:var(--text-m);display:flex;justify-content:space-between;background:var(--lgray);}
.obs div{border-bottom:1px solid #ccc;height:24px;margin-bottom:3px;}

/* FICHE FORMATIVE */
.ff-wrap{border:2px solid var(--navy);border-radius:8px;overflow:hidden;margin-top:20px;}
.ff-hdr{background:var(--navy);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.ff-hdr h3{font-size:13px;font-weight:700;color:#fff;}
.ff-hdr span{font-size:10px;color:rgba(255,255,255,.6);}
.ff-body{padding:14px;}
.ff-section{margin-bottom:14px;}
.ff-section-title{background:var(--gray);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:3px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;}
.ff-interv{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.ff-interv th{background:#f0f0f0;padding:5px 8px;border:1px solid #ccc;font-size:10px;font-weight:700;color:var(--gray);text-align:center;}
.ff-interv td{border:1px solid #ccc;padding:5px 8px;vertical-align:top;}
.ff-interv .vim-hdr{background:var(--navy);color:#fff;text-align:center;font-weight:700;}
.ff-interv .cdm-hdr{background:var(--orange);color:#fff;text-align:center;font-weight:700;}
.ff-interv input[type=text]{width:100%;border:none;outline:none;font-size:11px;background:transparent;font-family:inherit;}
/* PRISE DE RENSEIGNEMENTS */
.ff-etat{display:flex;gap:20px;margin-bottom:10px;align-items:center;}
.ff-etat label{font-size:12px;font-weight:600;color:var(--navy);}
.ff-radio-grp{display:flex;gap:14px;}
.ff-radio-grp label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;}
.ff-checklist{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ff-check-row{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border:1px solid #eee;border-radius:4px;background:#fafafa;font-size:12px;}
.ff-check-row .label{font-weight:500;color:var(--text);}
.ff-oui-non{display:flex;gap:12px;}
.ff-oui-non label{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;}
/* SCHÉMA SVG */
.ff-schema{position:relative;margin:10px 0;}
.ff-schema svg{width:100%;height:auto;display:block;}
.vim-label{position:absolute;background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px;cursor:move;user-select:none;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.vim-placed{background:var(--navy);}
/* ATTAQUE */
.ff-attaque{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ff-attaque-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 6px;border:1px solid #eee;border-radius:4px;background:#fafafa;}
.ff-attaque-item input{accent-color:var(--navy);}
/* GESTION */
.ff-gestion{width:100%;border-collapse:collapse;font-size:12px;}
.ff-gestion th{background:var(--navy);color:#fff;padding:6px 8px;font-size:10px;text-transform:uppercase;border:1px solid var(--navy);text-align:center;}
.ff-gestion td{border:1px solid #ddd;padding:5px 8px;}
.ff-gestion tr:nth-child(even) td{background:#f8f8f8;}
.ff-gestion .item-lbl{font-weight:500;}
.ff-gestion input[type=checkbox]{accent-color:var(--navy);width:14px;height:14px;}
.ff-obs{width:100%;border:1px solid #ddd;border-radius:5px;padding:7px;font-size:12px;resize:vertical;min-height:55px;font-family:inherit;margin-top:6px;}
@media print{.ff-schema .vim-label{display:block!important;}}

@media print{.app-header,.panel,.no-print{display:none!important;}.app-body{display:block;padding:0;}.fiche-wrap{border:none;border-radius:0;}body{background:#fff;}}
@media(max-width:768px){.app-body{grid-template-columns:1fr;}.panel{position:static;}.tg2{grid-template-columns:1fr;}.sr{grid-template-columns:1fr;}}
/* BOUTON RETOUR */
.btn-home{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
.btn-home:hover{background:rgba(255,255,255,.25);}
</style>

    gtag('event', 'imprimer_fiche');
  }
</script>

<body>

<header class="app-header">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <h1>RFFS BOD</h1>
      <span>Générateur de fiches d'exercice</span>
    </div>
    <div class="hdr-badge" style="padding:10px 20px;display:flex;align-items:center;">
      <a href="index.html" class="btn-home">← Accueil</a>
    </div>
  </div>
</header>

<div class="app-body">
  <aside class="panel no-print">
    <div class="panel-title">Paramètres de l'exercice</div>
    <div class="panel-body">

      <div class="fg">
        <label>Niveau RFFS</label>
        <div class="tg">
          <input type="radio" name="niv" id="n5" value="5"><label for="n5">Niveau 5</label>
          <input type="radio" name="niv" id="n7" value="7"><label for="n7">Niveau 7</label>
          <input type="radio" name="niv" id="n8" value="8" checked><label for="n8">Niveau 8</label>
        </div>
      </div>

      <div class="fg"><label>Aéronef</label><div class="sw"><select id="aeronef"></select></div></div>
      <div class="fg"><label>Catégorie</label><div class="sw"><select id="categorie" onchange="updThemes()">
        <option value="incendie">🔥 Incendie aéronef</option>
        <option value="structure">✈️ Structure / train / hydraulique</option>
        <option value="soute">📦 Soutes / détection</option>
        <option value="sauvetage">🚨 Sauvetage / urgence</option>
        <option value="special">⚠️ Situations spéciales</option>
        <option value="militaire">💣 Aviation militaire</option>
      </select></div></div>
      <div class="fg"><label>Thème d'intervention</label><div class="sw"><select id="theme"></select></div></div>

      <div class="fg">
        <label>Localisation</label>
        <div class="sw">
          <select id="loc">
            <option>Piste 23</option><option>Piste 05</option><option>Piste 11</option>
            <option>Piste 29</option><option>Seuil 05</option><option>Seuil 23</option><option>Seuil 29</option>
            <option>Parking Alpha</option><option>Parking Yankee</option>
            <option>Parking Kilo</option><option>Parking Lima</option>
            <option>Parking Fox</option><option>La FATO</option>
            <option>Zone essencier</option>
          </select>
        </div>
      </div>

      <div class="div"></div>

      <div class="row2">
        <div class="fg"><label>PN</label><input type="number" id="pn" min="1" max="10" value="3"></div>
        <div class="fg"><label>PAX</label><input type="number" id="pax" min="0" max="500" value="120"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Carburant</label><input type="text" id="cbrt" value="10 t"></div>
        <div class="fg"><label>Figurants</label><input type="number" id="fig" min="0" max="10" value="0"></div>
      </div>

      <div class="fg">
        <label>Conditions</label>
        <div class="tg">
          <input type="radio" name="cond" id="cj" value="Jour" checked><label for="cj">Jour</label>
          <input type="radio" name="cond" id="cn" value="Nuit"><label for="cn">Nuit</label>
        </div>
      </div>

      <div class="fg">
        <label>Fret</label>
        <div class="sw">
          <select id="fret">
            <option>Sans</option><option>Colis vrac</option><option>Pièces avion</option>
            <option>Matières dangereuses codes 50/60</option><option>Armement (canon, missiles, bombes)</option>
          </select>
        </div>
      </div>

      <div class="div"></div>
      <button class="btn-gen" onclick="gen()">⚡ Générer la fiche</button>
      <button class="btn-prt" onclick="trackPrint();window.print()">🖨 Imprimer / PDF</button>
      <div class="dv"></div>
      <a href="historique.html" style="display:block;width:100%;padding:8px;background:#1F3864;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;margin-top:4px;">📋 Voir l'historique</a>
    </div>
  </aside>

  <main>
    <div class="fiche-wrap" id="fw">
      <div class="placeholder">
        <div class="ico">📋</div>
        <h3>Configurez l'exercice</h3>
        <p>Sélectionnez les paramètres à gauche<br>puis cliquez sur <strong>Générer la fiche</strong></p>
      </div>
    </div>

  </main>
</div>

function getAeronefImg(aeronef){
  var a = (aeronef||'').toLowerCase();

  // Hélicoptères
  if(a.indexOf('ec1')>=0||a.indexOf('ec3')>=0||a.indexOf('as350')>=0||a.indexOf('h145')>=0||
     a.indexOf('h125')>=0||a.indexOf('bell')>=0||a.indexOf('aw')>=0||a.indexOf('helico')>=0||a.indexOf('sikorsky')>=0)
    return AERONEF_IMGS.helicoptere;

  // Militaires chasseurs
  if(a.indexOf('rafale')>=0||a.indexOf('f-16')>=0||a.indexOf('eurofighter')>=0||
     a.indexOf('mirage')>=0||a.indexOf('typhoon')>=0||a.indexOf('gripen')>=0)
    return AERONEF_IMGS.militaire;

  // Turbopropulseurs régionaux (ATR, Dash, Saab, C-130...)
  if(a.indexOf('atr')>=0||a.indexOf('dash')>=0||a.indexOf('saab')>=0||
     a.indexOf('c-130')>=0||a.indexOf('c130')>=0||a.indexOf('cn-235')>=0||a.indexOf('fokker 5')>=0)
    return AERONEF_IMGS.turboprop;

  // Monomoteurs / petits bimoteurs légers
  if(a.indexOf('cessna')>=0||a.indexOf('tbm')>=0||a.indexOf('piper')>=0||a.indexOf('sr2')>=0||
     a.indexOf('da40')>=0||a.indexOf('robin')>=0||a.indexOf('king air')>=0||a.indexOf('pc-12')>=0||
     a.indexOf('beech')>=0||a.indexOf('socata')>=0)
    return AERONEF_IMGS.monomoteur;

  // Quadriréacteurs (A340, A380, B747, A330 MRTT...)
  if(a.indexOf('a340')>=0||a.indexOf('a380')>=0||a.indexOf('b747')>=0||
     a.indexOf('mrtt')>=0||a.indexOf('awacs')>=0||a.indexOf('b-52')>=0)
    return AERONEF_IMGS.quadrireacteur;

  // Défaut : biréacteur jetliner (A320, B737, A350...)
  return AERONEF_IMGS.bireacteur;
}

// Gestion du placement VIM sur le schéma
let selectedVim = 1;
let selectedDir = 'L';
const vimPositions = {};

function selVim(n, dir){
  selectedVim = n; selectedDir = dir;
  document.querySelectorAll('[id^="badge-"]').forEach(b=>{
    const isMe = b.dataset.vim == n && b.dataset.dir == dir;
    b.style.borderColor = isMe ? '#fff' : 'transparent';
    b.style.filter = isMe ? 'brightness(1.25)' : 'brightness(0.6)';
  });
}

function selectVim(n){ selVim(n, selectedDir); }

function resetVims(){
  [1,2,3].forEach(n=>{ const o=document.getElementById('marker-vim'+n); if(o)o.remove(); });
  Object.keys(vimPositions).forEach(k=>delete vimPositions[k]);
  const pos=document.getElementById('vim-positions');
  if(pos) pos.innerHTML='';
  selVim(1,'L');
}

function placeVim(secteur, event){
  const svg = document.getElementById('svg-schema');
  if(!svg) return;
  const rect = svg.getBoundingClientRect();
  const svgW = svg.viewBox.baseVal.width || 480;
  const svgH = svg.viewBox.baseVal.height || 280;
  const svgX = (event.clientX - rect.left) * (svgW / rect.width);
  const svgY = (event.clientY - rect.top)  * (svgH / rect.height);

  const old = document.getElementById('marker-vim'+selectedVim);
  if(old) old.remove();

  const cabL = selectedDir === 'L';
  const w=46, h=20, bY=-h/2;
  const cabX = cabL ? -w/2 : w/2-15;

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('id','marker-vim'+selectedVim);
  g.style.pointerEvents='none';
  g.innerHTML = `<g transform="translate(${svgX},${svgY})">
    <rect x="${-w/2+1}" y="${bY+1}" width="${w}" height="${h}" rx="3" fill="rgba(0,0,0,0.45)"/>
    <rect x="${-w/2}" y="${bY}" width="${w}" height="${h}" rx="3" fill="#C55A11"/>
    <rect x="${cabX}" y="${bY-5}" width="15" height="${h+4}" rx="2" fill="#a04010"/>
    <rect x="${cabL?cabX+1:cabX+1}" y="${bY-2}" width="11" height="${h-4}" rx="1" fill="rgba(140,200,255,0.45)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    <rect x="${-w/2}" y="${bY}" width="${w}" height="${h}" rx="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"/>
    <circle cx="${-w/2+8}" cy="${bY+h+4}" r="5" fill="#111" stroke="#555" stroke-width="1.2"/>
    <circle cx="${-w/2+8}" cy="${bY+h+4}" r="2.5" fill="#2a2a2a"/>
    <circle cx="${w/2-8}"  cy="${bY+h+4}" r="5" fill="#111" stroke="#555" stroke-width="1.2"/>
    <circle cx="${w/2-8}"  cy="${bY+h+4}" r="2.5" fill="#2a2a2a"/>
    <text x="${cabL?6:-6}" y="1" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="bold" fill="#fff" font-family="Arial">V${selectedVim}</text>
  </g>`;
  svg.appendChild(g);

  vimPositions[selectedVim] = secteur;
  const pos = document.getElementById('vim-positions');
  if(pos) pos.innerHTML = Object.entries(vimPositions).map(([v,s])=>`<span style="margin:0 6px;background:var(--navy);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px">VIM ${v} → ${s}</span>`).join('');
}

// ── STOCKAGE LOCAL & EXPORT ───────────────────────────────────────────────────
function saveFormative(aeronef, theme, niv, cond){
  // Récupérer les agents sélectionnés
  const agents = [];
  document.querySelectorAll('.ff-interv select').forEach(sel=>{
    if(sel.value) agents.push(sel.value);
  });
  // Récupérer le résultat
  const resEl = document.querySelector('input[name="ff_resultat"]:checked');
  const resultat = resEl ? resEl.value : 'non_renseigné';
  const obs = document.getElementById('ff_obs_generale') ? document.getElementById('ff_obs_generale').value : '';

  const fiche = {
    id: Date.now(),
    date: new Date().toLocaleDateString('fr-FR'),
    heure: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}),
    aeronef,
    theme,
    niveau: niv,
    conditions: cond,
    agents: agents.join(' | '),
    resultat,
    observations: obs
  };

  // Sauvegarder dans localStorage
  const key = 'rffs_formatives';
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  existing.push(fiche);
  localStorage.setItem(key, JSON.stringify(existing));

  // Confirmer
  const confirm = document.getElementById('ff_save_confirm');
  if(confirm){ confirm.style.display='block'; setTimeout(()=>confirm.style.display='none', 3000); }

}

    c.items.forEach(it=>h+=`<tr><td>${it}</td><td class="cc"></td><td class="cc"></td><td></td></tr>`);

  return h+`</tbody></table>`;
}

function buildEvalCMPompiers(niv, nbv, aeronef, theme, cond){
  const vims=['VIM 1','VIM 2','VIM 3'].slice(0,nbv);
  const selStyle='width:100%;border:1.5px solid #ddd;border-radius:4px;font-size:11px;padding:3px 5px;background:#fff;font-family:inherit;';
  const agentOpts='<option value="">-- Choisir --</option>'
    +Object.entries(AGENTS).map(([eq,agents])=>
      `<optgroup label="${eq}">${agents.map(a=>`<option value="${a}">${a}</option>`).join('')}</optgroup>`
    ).join('');

  // Grille CM (sauf niv 5)
  const cmSection = niv>5 ? `
    <div style="background:#f0f4f8;border-radius:6px;padding:12px;margin-bottom:14px;border:1px solid #c8d4e0;">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px;">🎖️ Chef de Manœuvre</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
        <span style="font-size:12px;">Nom : <select id="evp-cm-nom" style="${selStyle}">${agentOpts}</select></span>
        <span style="font-size:12px;">Grade : <input type="text" placeholder="Grade..." style="border:1.5px solid #ddd;border-radius:4px;font-size:12px;padding:3px 6px;width:90px;"></span>
      </div>
      ${grille(critCM)}
      <div style="margin-top:8px;display:flex;gap:10px;">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:5px 12px;border:2px solid #375623;border-radius:5px;background:#fff;"><input type="radio" name="evp_cm_res" value="validé"> <span style="color:#375623;font-weight:700;">✓ VALIDÉ</span></label>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:5px 12px;border:2px solid #C00000;border-radius:5px;background:#fff;"><input type="radio" name="evp_cm_res" value="non_validé"> <span style="color:#C00000;font-weight:700;">✗ NON VALIDÉ</span></label>
      </div>
    </div>` : `<div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:5px;padding:8px 10px;font-size:11px;color:#C55A11;margin-bottom:14px;">⚖️ Niveau 5 : pas de Chef de Manœuvre — le conducteur VIM 1 assure le commandement.</div>`;

  // Grilles équipages VIM
  const vimSections = vims.map((v,i) => `
    <div style="background:#f8f8f8;border-radius:6px;padding:12px;margin-bottom:14px;border:1px solid #ddd;">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px;">🚒 ${v}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div>
          <div style="font-size:10px;color:#888;margin-bottom:3px;">CONDUCTEUR</div>
          <select id="evp-cond-${i+1}" style="${selStyle}">${agentOpts}</select>
        </div>
        <div>
          <div style="font-size:10px;color:#888;margin-bottom:3px;">OPÉRATEUR</div>
          <select id="evp-oper-${i+1}" style="${selStyle}">${agentOpts}</select>
        </div>
      </div>
      <div style="font-size:11px;font-weight:600;color:#595959;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;">Conducteur</div>
      ${grille(critConducteur)}
      <div style="font-size:11px;font-weight:600;color:#595959;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.3px;">Opérateur</div>
      ${grille(critOperateur)}
      <div style="margin-top:8px;display:flex;gap:10px;">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:5px 12px;border:2px solid #375623;border-radius:5px;background:#fff;"><input type="radio" name="evp_vim${i+1}_res" value="validé"> <span style="color:#375623;font-weight:700;">✓ VALIDÉ</span></label>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:5px 12px;border:2px solid #C00000;border-radius:5px;background:#fff;"><input type="radio" name="evp_vim${i+1}_res" value="non_validé"> <span style="color:#C00000;font-weight:700;">✗ NON VALIDÉ</span></label>
      </div>
    </div>`).join('');

  return `
  <div class="ff-wrap" style="border:2px solid var(--navy);border-radius:8px;overflow:hidden;margin-top:14px;">
    <div style="background:var(--navy);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;">
      <h3 style="font-size:12px;font-weight:700;color:#fff;">🎖️ ÉVALUATION CM & POMPIERS</h3>
      <span style="font-size:9px;color:rgba(255,255,255,.6);">${aeronef} — ${theme} — ${cond}</span>
    </div>
    <div style="padding:12px;">

      <!-- SÉLECTEUR TYPE DE FICHE -->
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <div onclick="evpSetType('cm')" id="evp-card-cm"
          style="flex:1;border:2px solid var(--navy);border-radius:7px;padding:9px 12px;cursor:pointer;background:#eef2f7;display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;">🎖️</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--navy);">Chef de manœuvre</div>
            <div style="font-size:10px;color:#595959;">Niveaux 6 / 7 / 8</div>
          </div>
        </div>
        <div onclick="evpSetType('vim')" id="evp-card-vim"
          style="flex:1;border:2px solid var(--border);border-radius:7px;padding:9px 12px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;">🚒</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--navy);">Équipage VIM</div>
            <div style="font-size:10px;color:#595959;">Conducteur + Opérateur</div>
          </div>
        </div>
      </div>

      <!-- SAISIE MANUELLE AÉRONEF/THÈME -->
      <div style="margin-bottom:12px;">
        <div style="font-size:10px;color:var(--navy);cursor:pointer;text-decoration:underline;display:inline;" onclick="evpToggleManual()">
          ✏️ Saisie manuelle aéronef / thème
        </div>
        <div id="evp-manual" style="display:none;margin-top:6px;display:none;gap:8px;flex-wrap:wrap;">
          <input type="text" id="evp-aeronef-manual" placeholder="Aéronef (ex: A320 CEO)" value="${aeronef}"
            style="flex:1;min-width:140px;padding:6px 9px;border:1.5px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit;">
          <input type="text" id="evp-theme-manual" placeholder="Thème (ex: Feu moteur)" value="${theme}"
            style="flex:1;min-width:140px;padding:6px 9px;border:1.5px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit;">
        </div>
      </div>

      <!-- CONTENU CM -->
      <div id="evp-section-cm">
        ${cmSection}
      </div>

      <!-- CONTENU ÉQUIPAGE VIM -->
      <div id="evp-section-vim" style="display:none;">
        ${vimSections}
      </div>

      <button onclick="saveEvalCMPompiers('${aeronef}','${theme}',${niv},'${cond}')"
        style="width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;">
        💾 Enregistrer l'évaluation
      </button>
      <div id="evp-confirm" style="display:none;text-align:center;margin-top:8px;font-size:11px;color:#375623;font-weight:600;">✓ Évaluation enregistrée !</div>
    </div>
  </div>`;
}

function evpSetType(type){
  const isCM = type==='cm';
  document.getElementById('evp-section-cm').style.display  = isCM ? 'block' : 'none';
  document.getElementById('evp-section-vim').style.display = isCM ? 'none' : 'block';
  const cardCM  = document.getElementById('evp-card-cm');
  const cardVIM = document.getElementById('evp-card-vim');
  if(cardCM)  { cardCM.style.borderColor  = isCM  ? 'var(--navy)' : 'var(--border)'; cardCM.style.background  = isCM  ? '#eef2f7' : '#fff'; }
  if(cardVIM) { cardVIM.style.borderColor = !isCM ? 'var(--navy)' : 'var(--border)'; cardVIM.style.background = !isCM ? '#eef2f7' : '#fff'; }
}

function evpToggleManual(){
  const el = document.getElementById('evp-manual');
  if(el) el.style.display = el.style.display==='none' ? 'flex' : 'none';
}

function saveEvalCMPompiers(aeronef, theme, niv, cond){
  const agents=[];
  document.querySelectorAll('[id^="evp-"]').forEach(s=>{if(s.value)agents.push(s.value);});
  const resEl=document.querySelector('input[name="evp_cm_res"]:checked');
  const resultat=resEl?resEl.value:'non_renseigné';
  const fiche={
    id:Date.now(),
    date:new Date().toLocaleDateString('fr-FR'),
    heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    aeronef, theme:'Éval. CM/Pompiers — '+theme,
    niveau:niv, conditions:cond,
    agents:agents.join(' | '),
    resultat, observations:''
  };
  const existing=JSON.parse(localStorage.getItem('rffs_formatives')||'[]');
  existing.push(fiche);
  localStorage.setItem('rffs_formatives',JSON.stringify(existing));
  const conf=document.getElementById('evp-confirm');
  if(conf){conf.style.display='block';setTimeout(()=>conf.style.display='none',3000);}
}


function switchTab(tab){
  const tabs=['sims','eval','evp'];
  tabs.forEach(t=>{
    const panel=document.getElementById('panel-'+t);
    const btn=document.getElementById('tab-'+t);
    if(panel) panel.style.display = t===tab ? 'block' : 'none';
    if(btn){
      btn.style.background = t===tab ? 'var(--navy)' : '#fff';
      btn.style.color      = t===tab ? '#fff' : 'var(--navy)';
    }
  });
  if(tab==='eval'){
    const gl=document.querySelector('[id^="grp-left-"]');
    if(gl && !gl.querySelector('span')){
      const nbv=+gl.id.replace('grp-left-','');
      initBadges(nbv);
    }
  }
}

function truckBadgeSVG(n,dir){
  var cabL=dir==='L',W=70,H=50;
  var cabX=cabL?4:W-26,cabW=22,bodyY=18,bodyH=20,ry=bodyY+bodyH+3;
  var tX=cabL?cabX+cabW+3:cabX-15,tW=12,tH=7,tY=bodyY-tH;
  var tubeX=tX+tW/2-2,tubeY1=tY-10,tubeY2=tY;
  var canonEndX=cabL?cabX:cabX+cabW,canonY=tubeY1+2;
  return '<svg width="'+W+'" height="'+(H+4)+'" viewBox="0 0 '+W+' '+(H+4)+'" xmlns="http://www.w3.org/2000/svg">'
    +'<rect x="4" y="'+(bodyY+1)+'" width="'+(W-7)+'" height="'+bodyH+'" rx="3" fill="rgba(0,0,0,0.3)" transform="translate(1,1)"/>'
    +'<rect x="3" y="'+bodyY+'" width="'+(W-6)+'" height="'+bodyH+'" rx="3" fill="#C55A11"/>'
    +'<rect x="3" y="'+bodyY+'" width="'+(W-6)+'" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>'
    +'<rect x="'+(cabX+1)+'" y="'+(bodyY-6)+'" width="'+cabW+'" height="'+(bodyH+5)+'" rx="3" fill="rgba(0,0,0,0.3)" transform="translate(1,1)"/>'
    +'<rect x="'+cabX+'" y="'+(bodyY-7)+'" width="'+cabW+'" height="'+(bodyH+6)+'" rx="3" fill="#a04010"/>'
    +'<rect x="'+cabX+'" y="'+(bodyY-7)+'" width="'+cabW+'" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>'
    +'<rect x="'+(cabL?cabX+3:cabX+2)+'" y="'+(bodyY-3)+'" width="16" height="11" rx="2" fill="rgba(140,200,255,0.55)" stroke="rgba(255,255,255,0.4)" stroke-width="0.6"/>'
    +'<rect x="'+(cabL?cabX+4:cabX+3)+'" y="'+(bodyY-2)+'" width="5" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>'
    +'<line x1="'+(tubeX+2)+'" y1="'+canonY+'" x2="'+canonEndX+'" y2="'+canonY+'" stroke="#999" stroke-width="3" stroke-linecap="round"/>'
    +'<line x1="'+(tubeX+2)+'" y1="'+(canonY-0.8)+'" x2="'+canonEndX+'" y2="'+(canonY-0.8)+'" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-linecap="round"/>'
    +'<rect x="'+tX+'" y="'+tY+'" width="'+tW+'" height="'+tH+'" rx="2" fill="#C55A11" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>'
    +'<rect x="'+tX+'" y="'+tY+'" width="'+tW+'" height="3" rx="2" fill="rgba(255,255,255,0.12)"/>'
    +'<rect x="'+tubeX+'" y="'+tubeY1+'" width="4" height="'+(tubeY2-tubeY1)+'" rx="1" fill="#aaa" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>'
    +'<circle cx="'+(tubeX+2)+'" cy="'+tubeY1+'" r="2.5" fill="#999" stroke="#ccc" stroke-width="0.6"/>'
    +'<rect x="3" y="'+bodyY+'" width="'+(W-6)+'" height="'+bodyH+'" rx="3" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>'
    +'<rect x="'+cabX+'" y="'+(bodyY-7)+'" width="'+cabW+'" height="'+(bodyH+6)+'" rx="3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>'
    +'<circle cx="16" cy="'+ry+'" r="6" fill="#111" stroke="#555" stroke-width="1.5"/><circle cx="16" cy="'+ry+'" r="3.5" fill="#2a2a2a"/><circle cx="16" cy="'+ry+'" r="1.5" fill="#444"/>'
    +'<circle cx="16" cy="'+(ry-3)+'" r="0.8" fill="#555"/><circle cx="16" cy="'+(ry+3)+'" r="0.8" fill="#555"/><circle cx="13" cy="'+ry+'" r="0.8" fill="#555"/><circle cx="19" cy="'+ry+'" r="0.8" fill="#555"/>'
    +'<circle cx="'+(W-16)+'" cy="'+ry+'" r="6" fill="#111" stroke="#555" stroke-width="1.5"/><circle cx="'+(W-16)+'" cy="'+ry+'" r="3.5" fill="#2a2a2a"/><circle cx="'+(W-16)+'" cy="'+ry+'" r="1.5" fill="#444"/>'
    +'<circle cx="'+(W-16)+'" cy="'+(ry-3)+'" r="0.8" fill="#555"/><circle cx="'+(W-16)+'" cy="'+(ry+3)+'" r="0.8" fill="#555"/><circle cx="'+(W-19)+'" cy="'+ry+'" r="0.8" fill="#555"/><circle cx="'+(W-13)+'" cy="'+ry+'" r="0.8" fill="#555"/>'
    +'<text x="'+(W/2)+'" y="'+(bodyY+bodyH/2+1)+'" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="bold" fill="#fff" font-family="Arial">VIM '+n+'</text>'
    +'</svg>';
}

function initBadges(nbv){
  var gl=document.getElementById('grp-left-'+nbv);
  var gr=document.getElementById('grp-right-'+nbv);
  if(!gl||!gr) return;
  for(var i=1;i<=nbv;i++){
    ['L','R'].forEach(function(dir){
      var sp=document.createElement('span');
      sp.id='badge-'+dir+'-'+i; sp.dataset.vim=i; sp.dataset.dir=dir;
      sp.style.cssText='display:inline-block;cursor:pointer;border:2px solid transparent;border-radius:8px;padding:2px;transition:all .15s;';
      sp.innerHTML=truckBadgeSVG(i,dir);
      sp.onclick=(function(n,d){return function(){selVim(n,d);};})(i,dir);
      if(dir==='L') gl.appendChild(sp); else gr.appendChild(sp);
    });
  }
  selVim(1,'L');
}

function getMiss(th,niv){return niv==5?th.m5:niv==7?th.m7:th.m8;}

      </div>

      <!-- ONGLET SIMS -->
      <div id="panel-sims" style="border:2px solid var(--navy);border-top:none;padding:14px;border-radius:0 0 6px 6px;">
        <p style="font-size:12px;color:#666;text-align:center;padding:20px 0;">
          ✅ La fiche SIMS ci-dessus contient toutes les informations pour conduire l'exercice.
        </p>
      </div>

      <!-- ONGLET ÉVAL. FORMATIVE -->
      <div id="panel-eval" style="display:none;">
        ${buildFormative(niv, nbv, aNom, th.l, cond)}
      </div>

      <!-- ONGLET ÉVAL. CM & POMPIERS -->
      <div id="panel-evp" style="display:none;">
        ${buildEvalCMPompiers(niv, nbv, aNom, th.l, cond)}
      </div>

    </div>
    <div class="fiche-footer">
      <span>FJ  |  Réf. RFFS/FICHE  |  Doc. interne — ne pas diffuser</span>
      <span>RFFS BOD — Niveau ${niv} — ${aNom} — ${th.l}</span>
    </div>
  </div>`;
  // Attacher les listeners sur les boutons onglets après injection HTML
  setTimeout(function(){
    const btnSims = document.getElementById('tab-sims');
    const btnEval = document.getElementById('tab-eval');
    const btnEvp  = document.getElementById('tab-evp');
    if(btnSims) btnSims.addEventListener('click', function(){ switchTab('sims'); });
    if(btnEval) btnEval.addEventListener('click', function(){ switchTab('eval'); });
    if(btnEvp)  btnEvp.addEventListener('click',  function(){ switchTab('evp');  });
    switchTab('sims');
  }, 50);
}

document.querySelectorAll('input[name="niv"]').forEach(r=>r.addEventListener('change',upd));
upd();


</script>
</body>
</html>
