<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Fiches d'Exercice RFFS BOD</title>
<style>
:root{--navy:#1F3864;--navy-l:#2a4a80;--orange:#C55A11;--orange-l:#e06820;--red:#C00000;--green:#375623;--amber:#E36C09;--gray:#595959;--lgray:#f5f5f5;--lblue:#D6E4F7;--border:#ddd;--text:#1a1a1a;--text-m:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:var(--text);min-height:100vh;}
.app-header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;align-items:stretch;}
.hdr-brand{padding:14px 24px;display:flex;flex-direction:column;justify-content:center;}
.hdr-brand h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px;}
.hdr-brand span{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.hdr-badge{background:var(--orange);padding:14px 20px;margin-left:auto;display:flex;align-items:center;}
.hdr-badge span{font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;}
.app-body{max-width:1200px;margin:0 auto;padding:20px 14px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;position:sticky;top:68px;}
.panel-title{background:var(--navy);padding:12px 18px;font-size:12px;font-weight:700;color:#fff;letter-spacing:.8px;text-transform:uppercase;}
.panel-body{padding:18px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fg select,.fg input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:#fff;transition:border-color .2s;appearance:none;}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--navy);}
.sw{position:relative;}
.sw::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none;font-size:11px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tg{display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.tg input{display:none;}
.tg label{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;transition:all .2s;margin:0;text-transform:none;letter-spacing:0;border:none;}
.tg input:checked+label{background:var(--navy);color:#fff;}
.div{height:1px;background:var(--border);margin:14px 0;}
.btn-gen{width:100%;padding:12px;background:var(--orange);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;}
.btn-gen:hover{background:var(--orange-l);}
.btn-gen:active{transform:scale(.98);}
.btn-prt{width:100%;padding:9px;background:#fff;color:var(--navy);border:1.5px solid var(--navy);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn-prt:hover{background:var(--navy);color:#fff;}
.fiche-wrap{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;}
.placeholder{padding:70px 30px;text-align:center;color:var(--text-m);}
.placeholder .ico{font-size:40px;margin-bottom:14px;opacity:.25;}
.placeholder h3{font-size:17px;font-weight:500;margin-bottom:6px;color:var(--gray);}
.placeholder p{font-size:13px;}
/* FICHE */
.fiche-hdr{display:grid;grid-template-columns:1fr auto;}
.fhdr-l{background:var(--navy);padding:13px 18px;}
.fhdr-l h2{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px;}
.fhdr-l span{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px;display:block;}
.fhdr-r{background:var(--orange);padding:13px 18px;display:flex;align-items:center;}
.fhdr-r span{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;}
.fiche-body{padding:16px;}
.id-t{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px;}
.id-t td{padding:6px 9px;border:1px solid #ccc;}
.lbl{background:#f0f0f0;font-weight:600;color:var(--gray);font-size:10px;text-transform:uppercase;white-space:nowrap;}
.vm{font-weight:700;color:var(--navy);font-size:14px;}
.vniv{font-weight:800;font-size:18px;text-align:center;}
.vr{color:var(--red)}.va{color:var(--amber)}.vg{color:var(--green)}.vo{color:var(--orange)}
.vav{color:var(--red);font-weight:700}.vpob{color:var(--red);font-weight:700;font-size:15px;}
.bg-b{background:var(--lblue);}
.shdr{padding:7px 12px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.8px;text-transform:uppercase;margin:12px 0 8px;border-radius:4px;}
.shdr.nv{background:var(--navy)}.shdr.gy{background:var(--gray)}.shdr.or{background:var(--orange);}
.abox{border:2px solid var(--amber);background:#fffbe6;border-radius:7px;padding:12px 14px;margin-bottom:8px;}
.abox p{font-size:12px;line-height:1.6;margin-bottom:3px;}
.abox .bd{font-weight:700}.abox .it{font-style:italic;}
.qbox{font-size:11px;color:var(--gray);margin-bottom:14px;font-style:italic;padding:7px 11px;background:var(--lgray);border-radius:5px;border-left:3px solid var(--navy);}
.qbox strong{color:var(--navy);font-style:normal;}
.st{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px;}
.st td{border:1px solid #ccc;vertical-align:top;}
.sl{width:32px;text-align:center;font-size:20px;font-weight:800;color:#fff;padding:10px 4px;}
.slb{width:80px;font-size:10px;font-weight:700;padding:8px 7px;background:var(--lgray);text-transform:uppercase;letter-spacing:.5px;}
.sc{padding:9px 11px;line-height:1.6;}
.ss{background:var(--navy)}.si{background:var(--orange)}.sm{background:var(--red)}.ssec{background:var(--green);}
.ssl{color:var(--navy)}.sil{color:var(--orange)}.sml{color:var(--red)}.ssecl{color:var(--green);}
.dt{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px;}
.dt th{background:var(--navy);color:#fff;padding:7px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--navy);text-align:left;}
.dt td{padding:7px 9px;border:1px solid #ccc;vertical-align:top;}
.dt tr:nth-child(even) td{background:var(--lgray);}
.vn{font-weight:700;color:var(--navy)}.sn{font-weight:700;color:var(--orange);}
.tg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.tc{border:1px solid #ddd;border-radius:7px;padding:10px;background:var(--lgray);font-size:11px;}
.tc h4{font-size:11px;font-weight:700;margin-bottom:5px;}
.tc ul{list-style:none;padding:0;}
.tc ul li{padding:2px 0;color:var(--text-m);line-height:1.5;}
.tc ul li::before{content:'› ';color:var(--navy);}
.et{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px;}
.et th{background:var(--navy);color:#fff;padding:7px 9px;border:1px solid var(--navy);text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
.et th.sm{width:44px;text-align:center;}
.et td{border:1px solid #ccc;padding:6px 9px;}
.et .cr td{background:var(--gray);color:#fff;font-weight:600;font-size:11px;padding:6px 9px;}
.et tr:nth-child(even):not(.cr) td{background:var(--lgray);}
.et .cc{text-align:center;width:44px;}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:14px;}
.sb{border:1px solid #ccc;border-radius:5px;padding:9px;background:var(--lgray);font-size:11px;color:var(--gray);}
.fiche-footer{border-top:1px solid var(--border);padding:8px 18px;font-size:10px;color:var(--text-m);display:flex;justify-content:space-between;background:var(--lgray);}
.obs div{border-bottom:1px solid #ccc;height:24px;margin-bottom:3px;}
@media print{.app-header,.panel,.no-print{display:none!important;}.app-body{display:block;padding:0;}.fiche-wrap{border:none;border-radius:0;}body{background:#fff;}}
@media(max-width:768px){.app-body{grid-template-columns:1fr;}.panel{position:static;}.tg2{grid-template-columns:1fr;}.sr{grid-template-columns:1fr;}}
/* BOUTON RETOUR */
.btn-home{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
.btn-home:hover{background:rgba(255,255,255,.25);}
</style>
</head>
<body>

<header class="app-header">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <h1>RFFS BOD</h1>
      <span>Générateur de fiches d'exercice</span>
    </div>
    <div class="hdr-badge" style="padding:10px 20px;display:flex;align-items:center;">
      <a href="index.html" class="btn-home">← Accueil</a>
    </div>
  </div>
</header>

<div class="app-body">
  <aside class="panel no-print">
    <div class="panel-title">Paramètres de l'exercice</div>
    <div class="panel-body">

      <div class="fg">
        <label>Niveau RFFS</label>
        <div class="tg">
          <input type="radio" name="niv" id="n5" value="5"><label for="n5">Niveau 5</label>
          <input type="radio" name="niv" id="n7" value="7"><label for="n7">Niveau 7</label>
          <input type="radio" name="niv" id="n8" value="8" checked><label for="n8">Niveau 8</label>
        </div>
      </div>

      <div class="fg"><label>Aéronef</label><div class="sw"><select id="aeronef"></select></div></div>
      <div class="fg"><label>Catégorie</label><div class="sw"><select id="categorie" onchange="updThemes()">
        <option value="incendie">🔥 Incendie aéronef</option>
        <option value="structure">✈️ Structure / train / hydraulique</option>
        <option value="soute">📦 Soutes / détection</option>
        <option value="sauvetage">🚨 Sauvetage / urgence</option>
        <option value="special">⚠️ Situations spéciales</option>
        <option value="militaire">💣 Aviation militaire</option>
      </select></div></div>
      <div class="fg"><label>Thème d'intervention</label><div class="sw"><select id="theme"></select></div></div>

      <div class="fg">
        <label>Localisation</label>
        <div class="sw">
          <select id="loc">
            <option>Piste 23</option><option>Piste 05</option><option>Piste 11</option>
            <option>Piste 29</option><option>Seuil 05</option><option>Seuil 23</option><option>Seuil 29</option>
            <option>Parking Alpha</option><option>Parking Yankee</option>
            <option>Parking Kilo</option><option>Parking Lima</option>
            <option>Parking Fox</option><option>La FATO</option>
            <option>Zone essencier</option>
          </select>
        </div>
      </div>

      <div class="div"></div>

      <div class="row2">
        <div class="fg"><label>PN</label><input type="number" id="pn" min="1" max="10" value="3"></div>
        <div class="fg"><label>PAX</label><input type="number" id="pax" min="0" max="500" value="120"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Carburant</label><input type="text" id="cbrt" value="10 t"></div>
        <div class="fg"><label>Figurants</label><input type="number" id="fig" min="0" max="10" value="0"></div>
      </div>

      <div class="fg">
        <label>Conditions</label>
        <div class="tg">
          <input type="radio" name="cond" id="cj" value="Jour" checked><label for="cj">Jour</label>
          <input type="radio" name="cond" id="cn" value="Nuit"><label for="cn">Nuit</label>
        </div>
      </div>

      <div class="fg">
        <label>Fret</label>
        <div class="sw">
          <select id="fret">
            <option>Sans</option><option>Colis vrac</option><option>Pièces avion</option>
            <option>Matières dangereuses codes 50/60</option><option>Armement (canon, missiles, bombes)</option>
          </select>
        </div>
      </div>

      <div class="div"></div>
      <button class="btn-gen" onclick="gen()">⚡ Générer la fiche</button>
      <button class="btn-prt" onclick="window.print()">🖨 Imprimer / PDF</button>
    </div>
  </aside>

  <main>
    <div class="fiche-wrap" id="fw">
      <div class="placeholder">
        <div class="ico">📋</div>
        <h3>Configurez l'exercice</h3>
        <p>Sélectionnez les paramètres à gauche<br>puis cliquez sur <strong>Générer la fiche</strong></p>
      </div>
    </div>

  </main>
</div>

<script>

const TH={
  feu_moteur:{
    l:"Feu moteur",av:"Feu moteur",
    al:[{t:"Vous prenez l'alerte pour un avion en retour terrain avec problème technique.",b:1},{t:"Feu moteur signalé — extinction bord en cours.",i:1},{t:"L'aéronef vient de s'immobiliser sur la piste. Intervenez.",b:1}],
    q:"POB — Carburant — Fret — Moteur en feu confirmé ? — Extinction bord efficace ? — Évacuation en cours ? — Renforts ?",
    sit:["Alerte TWR : aéronef en retour terrain avec feu moteur.","Extinction bord percutée — résultat inconnu.","Appareil immobilisé sur piste — intervenez immédiatement."],
    m5:["VIM 1 → Secteur 1 (côté moteur sinistre) : Extinction feu — poudre + LDV — protection couloir évacuation.","Chef de manœuvre : SIMS radio — CR TWR — coordination sauvetage."],
    m7:["VIM 1 → Secteur 1 (côté moteur sinistre) : Extinction feu moteur — poudre + LDV.","VIM 2 → Secteur 2 (côté opposé) : Protection fuselage — appui sauvetage.","Chef de manœuvre : SIMS radio — coordination évacuation PAX — CR TWR."],
    m8:["VIM 1 → Secteur 1 (côté moteur sinistre) : Extinction feu moteur — poudre + LDV.","VIM 2 → Secteur 2 (côté opposé) : Protection fuselage — appui sauvetage PAX.","VIM 3 → Secteur 4 (arrière) : Surveillance propagation — protection réservoirs.","Chef de manœuvre : coordination générale — SIMS radio — CR TWR."],

    m8:["VIM 1 → Secteur 1 (avant gauche) : Sauvetage — accès portes/trappes — extinction si feu.","VIM 2 → Secteur 2 (avant droit) : Protection fuselage — mousse préventive.","VIM 3 → Secteur 4 (arrière) : Surveillance — protection réservoirs intrados.","Chef de manœuvre : coordination générale — SIMS radio — CR TWR."],

    m7:["VIM 1 → Secteur 1 (avant) : Accès cabine — ARI — sauvetage — manœuvres sécurité si pilote inconscient.","VIM 2 → Secteur 2 (latéral) : Protection fuselage — mousse si fuite carburant.","Chef de manœuvre : SIMS radio — SAMU — CR TWR."],

function updThemes(){
  const cat=document.getElementById('categorie').value;
  const keys=CATS[cat]||Object.keys(TH);
  document.getElementById('theme').innerHTML=keys.filter(k=>TH[k]).map(k=>`<option value="${k}">${TH[k].l}</option>`).join('');
}

function upd(){
  document.getElementById('aeronef').innerHTML=AV.map(a=>a.sep?`<option disabled style="font-weight:700;color:#888">${a.n}</option>`:`<option value="${a.n}">${a.n}${a.c?' — '+a.c:''}</option>`).join('');
  updThemes();
}

function getMiss(th,niv){return niv==5?th.m5:niv==7?th.m7:th.m8;}

  const niv=+document.querySelector('input[name="niv"]:checked').value;
  const aNom=document.getElementById('aeronef').value;
  const av=AV.find(a=>a.n===aNom)||{t:'',c:''};

  const cbrt=document.getElementById('cbrt').value;

  const cond=document.querySelector('input[name="cond"]:checked').value;

  const miss=getMiss(th,niv);
  const nc=NC[niv];

  const alH=th.al.map(l=>`<p class="${l.b?'bd':''} ${l.i?'it':''}">${l.t}</p>`).join('');

    {l:'M',w:'MISSION',cs:'sm',cl:'sml',c:miss.join('<br>')},

  ];
  const simH=simD.map(r=>`<tr><td class="sl ${r.cs}">${r.l}</td><td class="slb ${r.cl}">${r.w}</td><td class="sc">${r.c}</td></tr>`).join('');

  const sects=["S1","S2","S4"];
  const pos=["Secteur 1 (avant gauche)","Secteur 2 (avant droit)","Secteur 4 (arrière)"];
  const dispH=Array.from({length:nbv},(_,i)=>`<tr><td class="vn">VIM ${i+1}</td><td class="sn">${sects[i]}</td><td>${pos[i]}</td><td>${miss[i]||miss[miss.length-1]}</td></tr>`).join('');

  const techH=th.tc.map(t=>`<div class="tc"><h4 style="color:var(--${t.c==='red'?'red':'navy'})">${t.ti}</h4><ul>${t.li.map(l=>`<li>${l}</li>`).join('')}</ul></div>`).join('');

  const ecats=[
    {c:"1. Prise d'alerte & renseignements",i:["Déclenche la procédure d'alerte correctement","Recueille : type d'incident, aéronef, POB, carburant, avarie","Pose les questions réglementaires à la TWR","Évalue et demande renforts si nécessaire"]},
    {c:"2. Ordre initial — SIMS",i:["Formule la Situation clairement (SIMS radio)","Complète les Informations manquantes","Donne la Mission à chaque VIM (secteur + action)","Énonce les consignes de Sécurité"]},
    {c:"3. Positionnement & intervention",i:[`VIM positionnés correctement (${nbv} VIM — secteurs adaptés)`,"Approche sécurisée — zones de danger respectées","Techniques d'extinction adaptées au sinistre","Surveillance continue de l'évolution"]},
    {c:"4. Commandement & communication",i:["Utilise l'ordre graphique (ZI, sinistre, moyens, actions)","Compte rendu régulier à la TWR","Gère l'évolution — ordre d'évolution SIMS si besoin","Veille à la sécurité du personnel intervenant"]},
    {c:"5. Retour & débriefing",i:["Reconditionnement des véhicules vérifié","Disponibilité des moyens rendue compte","Débriefing en 4 phases conduit","Révalorisation du groupe assurée"]},
  ];
  let evH='';
  ecats.forEach(c=>{
    evH+=`<tr class="cr"><td colspan="4">${c.c}</td></tr>`;
    c.i.forEach(it=>evH+=`<tr><td>${it}</td><td class="cc"></td><td class="cc"></td><td class="cc"></td></tr>`);
  });

  document.getElementById('fw').innerHTML=`
  <div class="fiche">
    <div class="fiche-hdr">
      <div class="fhdr-l"><h2>RFFS BOD — FICHE D'EXERCICE</h2><span>${cond} — Niveau RFFS ${niv} — ${nbv} × VIM 108 P2.5</span></div>
      <div class="fhdr-r"><span>${th.l.toUpperCase()}</span></div>
    </div>
    <div class="fiche-body">
      <table class="id-t">
        <tr><td class="lbl">AÉRONEF</td><td class="vm bg-b" colspan="3">${aNom} <small style="font-weight:400;font-size:11px;color:#888">(${av.t})</small></td><td class="lbl">NIVEAU RFFS</td><td class="vniv ${nc} bg-b">${niv}</td></tr>
        <tr><td class="lbl">MOYENS</td><td colspan="3" style="font-weight:700;color:var(--navy)">${nbv} × VIM 108 P2.5</td><td class="lbl">LOCALISATION</td><td style="font-weight:700;color:var(--navy)">${loc}</td></tr>
        <tr><td class="lbl">PN</td><td style="font-weight:700">${pn}</td><td class="lbl">PAX</td><td style="font-weight:700">${pax}</td><td class="lbl">POB TOTAL</td><td class="vpob bg-b">${pob}</td></tr>
        <tr><td class="lbl">CARBURANT</td><td colspan="3" class="vo" style="font-weight:700">${cbrt}</td><td class="lbl">FIGURANTS</td><td>${fig}</td></tr>
        <tr><td class="lbl">AVARIE</td><td colspan="3" class="vav">${th.av}</td><td class="lbl">FRET</td><td>${fret}</td></tr>
        <tr><td class="lbl">CONDITIONS</td><td colspan="3" style="font-weight:600">${cond}</td><td class="lbl">DÉPART</td><td style="font-weight:700">RFFS BOD</td></tr>
      </table>
      <div class="shdr gy">Déclenchement d'alerte</div>
      <div class="abox">${alH}</div>
      <div class="qbox"><strong>❓ Questions à poser à la TWR :</strong> ${th.q}</div>
      <div class="shdr nv">Commandement — Méthode SIMS (ordre initial)</div>
      <table class="st">${simH}</table>
      <div class="shdr gy">Dispositif d'intervention — Répartition VIM</div>
      <table class="dt"><thead><tr><th>Véhicule</th><th>Secteur</th><th>Position</th><th>Mission</th></tr></thead><tbody>${dispH}</tbody></table>
      <p style="font-size:10px;color:#999;font-style:italic;margin-bottom:12px">Sectorisation cadran horaire — S1 avant gauche / S2 avant droit / S4 arrière</p>
      <div class="shdr or">Points techniques clés — ${aNom} — ${th.l}</div>
      <div class="tg2" style="margin-top:8px">${techH}</div>
      <div class="shdr nv">Grille d'évaluation — Chef de manœuvre</div>
      <table class="et" style="margin-top:8px"><thead><tr><th>Critères d'évaluation</th><th class="sm">✓</th><th class="sm">✗</th><th class="sm">Obs.</th></tr></thead><tbody>${evH}</tbody></table>
      <p style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px">Observations de l'évaluateur :</p>
      <div class="obs"><div></div><div></div><div></div><div></div></div>
      <div class="sr">
        <div class="sb">Évaluateur : ……………………………</div>
        <div class="sb">Date : ………………………………………</div>
        <div class="sb" style="font-weight:700">Résultat : ✓ VALIDÉ &nbsp; ✗ NON VALIDÉ</div>
      </div>
    </div>
    <div class="fiche-footer">
      <span>FJ  |  Réf. RFFS/FICHE  |  Doc. interne — ne pas diffuser</span>
      <span>RFFS BOD — Niveau ${niv} — ${aNom} — ${th.l}</span>
    </div>
  </div>`;
}

document.querySelectorAll('input[name="niv"]').forEach(r=>r.addEventListener('change',upd));
upd();

</script>
</body>
</html>
